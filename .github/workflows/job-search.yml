name: Sheikh Job Search
on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *'
    - cron: '30 12 * * *'
jobs:
  job-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm install
      - run: node sheikh-automated-system.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
