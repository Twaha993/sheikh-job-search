name: Sheikh Job Search

   on:
     schedule:
       - cron: '30 3 * * *'
       - cron: '30 12 * * *'
     workflow_dispatch:

   jobs:
     job-search:
       runs-on: ubuntu-latest
       steps:
         - name: Checkout
           uses: actions/checkout@v5

         - name: Setup Node
           uses: actions/setup-node@v5
           with:
             node-version: '20'

         - name: Install dependencies
           run: npm install

         - name: Run job search
           env:
             GMAIL_USER: ${{ secrets.GMAIL_USER }}
             GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
           run: node sheikh-automated-system.js
