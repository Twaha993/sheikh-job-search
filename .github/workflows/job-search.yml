name: 🤖 Sheikh's Automated Job Search

on:
  schedule:
    - cron: '30 3 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  automated-job-search:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ✅ Checkout repository
        uses: actions/checkout@v3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🤖 Run Sheikh's Job Search
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node sheikh-automated-system.js

      - name: 📊 Save results
        if: always()
        run: |
          git config user.name "Job Search Bot"
          git config user.email "bot@github.com"
          if [ -f "applications-sheikh.json" ]; then
            git add applications-sheikh.json
            git commit -m "📊 Job applications tracked - $(date +'%Y-%m-%d %H:%M')" || true
            git push || true
          fi

      - name: ✅ Success
        if: success()
        run: echo "Job search completed successfully"
